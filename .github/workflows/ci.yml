name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libgl1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install black isort flake8 pylint mypy

      - name: Run isort (import order)
        run: isort --check-only --diff main.py src/

      - name: Run black (formatting)
        run: black --check main.py src/

      - name: Run flake8 (style)
        run: flake8 main.py src/

      - name: Run mypy (type checking)
        run: mypy

      - name: Run pylint (static analysis)
        run: pylint main.py src/

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            --ignore=src/ui

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
